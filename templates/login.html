{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-black text-white p-4 text-center border-0">
                    <h2 class="brand-text mb-3">Connectify</h2>
                    <h3 class="fw-bold m-0 fs-5">Welcome Back</h3>
                    <p class="small opacity-75 m-0">Sign in to Connectify</p>
                </div>
                <div class="card-body p-4 p-lg-5 bg-white">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="id_username" class="form-label fw-bold small text-uppercase">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control bg-light border-0 py-2" id="id_username" placeholder="Enter username" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label fw-bold small text-uppercase">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-key"></i></span>
                                <input type="password" name="password" class="form-control bg-light border-0 py-2" id="id_password" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-black w-100 py-3 fw-bold rounded-3 shadow-sm mb-3">
                            Login <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </form>
                    <div class="text-center">
                        <p class="text-muted small">New to Connectify? <a href="{% url 'register' %}" class="text-black fw-bold text-decoration-none border-bottom border-dark border-2">Create an account</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
