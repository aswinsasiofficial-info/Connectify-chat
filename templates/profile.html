{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="sidebar hide-mobile">
    <div class="p-4 border-bottom">
        <img src="{% static 'images/logo.jpeg' %}" alt="Connectify" style="height: 30px; filter: brightness(0);">
    </div>
    <div class="p-3">
        <div class="list-group list-group-flush">
            <a href="{% url 'profile' %}" class="list-group-item list-group-item-action border-0 active bg-black text-white rounded-3 mb-2">
                <i class="bi bi-person-circle me-2"></i> Profile
            </a>
            <a href="#" class="list-group-item list-group-item-action border-0 rounded-3 mb-2">
                <i class="bi bi-shield-lock me-2"></i> Privacy
            </a>
            <form method="post" class="d-none d-md-block" onsubmit="return confirm('Are you sure you want to delete your account? This action cannot be undone.')">
                {% csrf_token %}
                <button type="submit" name="delete_account" class="list-group-item list-group-item-action border-0 rounded-3 text-danger">
                    <i class="bi bi-trash me-2"></i> Delete Account
                </button>
            </form>
        </div>
    </div>
</div>

<div class="chat-window show-mobile overflow-y-auto p-4 p-md-5">
    <div class="container-fluid" style="max-width: 600px;">
        <div class="d-flex align-items-center mb-4 d-md-none">
            <a href="{% url 'home' %}" class="btn btn-link text-dark me-2 p-0"><i class="bi bi-arrow-left fs-4"></i></a>
            <h4 class="fw-bold mb-0">My Profile</h4>
        </div>
        
        <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
            <div class="text-center mb-5">
                <div class="position-relative d-inline-block">
                    {% if user.profile.avatar %}
                        <img src="{{ user.profile.avatar.url }}" class="rounded-circle shadow" style="width: 160px; height: 160px; object-fit: cover; border: 4px solid #fff;">
                    {% else %}
                        <i class="bi bi-person-circle text-light bg-dark rounded-circle" style="font-size: 10rem; line-height: 1;"></i>
                    {% endif %}
                    <form method="post" enctype="multipart/form-data" id="avatar-form" class="position-absolute bottom-0 end-0">
                        {% csrf_token %}
                        <input type="file" name="avatar" id="avatar-input" class="d-none" accept="image/*" onchange="document.getElementById('avatar-form').submit()">
                        <button type="button" class="btn btn-black btn-sm rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width: 44px; height: 44px; border: 3px solid #fff;" onclick="document.getElementById('avatar-input').click()">
                            <i class="bi bi-camera-fill fs-5"></i>
                        </button>
                    </form>
                </div>
                <h3 class="fw-bold mt-4 mb-1">{{ user.username }}</h3>
                <p class="text-muted small">Hey there! I am using Connectify</p>
            </div>

            <div class="row g-4">
                <div class="col-12">
                    <label class="form-label small fw-bold text-uppercase text-muted letter-spacing-1">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-0 py-2 px-3 fw-bold" value="{{ user.username }}" readonly>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold text-uppercase text-muted letter-spacing-1">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-0 py-2 px-3 fw-bold" value="{{ user.email|default:'No email provided' }}" readonly>
                    </div>
                </div>
                <div class="col-12 mt-5">
                    <div class="d-grid gap-2">
                        <button class="btn btn-black py-3 fw-bold rounded-3 shadow-sm transition-all hover-scale">
                            Edit Account Details <i class="bi bi-pencil-square ms-2"></i>
                        </button>
                        <form method="post" class="d-md-none" onsubmit="return confirm('Are you sure you want to delete your account? This action cannot be undone.')">
                            {% csrf_token %}
                            <button type="submit" name="delete_account" class="btn btn-outline-danger w-100 py-3 fw-bold rounded-3 mb-2">
                                <i class="bi bi-trash me-2"></i> Delete Account
                            </button>
                        </form>
                        <form action="{% url 'logout' %}" method="post" class="d-md-none">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger w-100 py-3 fw-bold rounded-3">
                                <i class="bi bi-box-arrow-right me-2"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .letter-spacing-1 { letter-spacing: 1px; }
    .transition-all { transition: all 0.2s ease-in-out; }
    .hover-scale:hover { transform: scale(1.01); }
</style>
{% endblock %}
