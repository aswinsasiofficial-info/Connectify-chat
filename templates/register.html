{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-black text-white p-4 text-center border-0">
                    <img src="{% static 'images/connectify-logo.png' %}" alt="Connectify" style="height: 50px; filter: brightness(0) invert(1);" class="mb-2">
                    <h4 class="fw-bold m-0">Register</h4>
                </div>
                <div class="card-body p-4 bg-white">
                    <form method="post" class="auth-form">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}" class="form-label fw-bold small text-uppercase mb-1">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1" style="font-size: 0.7rem;">{{ field.errors }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-black w-100 py-2 fw-bold rounded-3 shadow-sm mb-3 mt-2">
                            Create Account
                        </button>
                    </form>
                    <div class="text-center">
                        <p class="text-muted small mb-0">Already on Connectify? <a href="{% url 'login' %}" class="text-black fw-bold text-decoration-none border-bottom border-dark border-2">Sign in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .auth-form input {
        display: block;
        width: 100%;
        padding: 0.5rem 1rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #000;
        background-color: #f8f9fa;
        background-clip: padding-box;
        border: 0;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
    .auth-form ul {
        list-style: none;
        padding: 0;
        margin: 5px 0;
        font-size: 0.75rem;
        color: #6c757d;
    }
</style>
{% endblock %}
