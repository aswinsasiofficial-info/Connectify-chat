services:
  - type: web
    name: connectify-chat
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn chat_project.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: connectify-redis
          property: connectionString

  - type: redis
    name: connectify-redis
    ipAllowList: [] # only allow internal connections
